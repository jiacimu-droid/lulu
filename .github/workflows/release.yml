name: Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag, for example v2.2.3. Leave empty to use build-<run_number>."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Prepare build files
        env:
          KEY_BASE64: ${{ secrets.KEY_BASE64 }}
          SIGNING_CONFIG: ${{ secrets.SIGNING_CONFIG }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail

          if [ -z "$KEY_BASE64" ] || [ -z "$SIGNING_CONFIG" ] || [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error title=Missing release secrets::Release builds require KEY_BASE64, SIGNING_CONFIG, and GOOGLE_SERVICES_JSON."
            exit 1
          fi

          printf '%s' "$KEY_BASE64" | base64 -d > app/app.key
          printf '%s' "$SIGNING_CONFIG" > local.properties
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Gradle Build
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Collect APK files
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/*.apk release-artifacts/
          ls -lh release-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: release-apk
          path: release-artifacts/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          tag="$RELEASE_TAG"
          if [ -z "$tag" ]; then
            tag="build-${GITHUB_RUN_NUMBER}"
          fi

          title="Lulu ${tag}"
          notes="Automated release APK build from ${GITHUB_SHA}."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-artifacts/*.apk --clobber
          else
            gh release create "$tag" release-artifacts/*.apk --title "$title" --notes "$notes"
          fi
