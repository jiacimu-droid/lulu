name: Lulu APK

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      release_number:
        description: '正式发布编号，例如 1、2、3'
        required: true
        default: '1'
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: lulu-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install web dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Prepare signing
        run: |
          cat > local.properties <<'EOF'
          storeFile=release-public.key
          storePassword=lulu-release-password
          keyAlias=lulu
          keyPassword=lulu-release-password
          EOF

      - name: Build signed release APK
        run: |
          mkdir -p ci-logs
          chmod +x ./gradlew
          set -o pipefail
          ./gradlew --no-daemon --no-build-cache assembleRelease -x uploadCrashlyticsMappingFileRelease 2>&1 | tee ci-logs/build.log

      - name: Collect APK
        run: |
          set -euo pipefail
          mkdir -p apk-artifacts
          apk="$(find app/build/outputs/apk/release -name '*-release.apk' -print -quit)"
          test -n "$apk"
          cp "$apk" apk-artifacts/Lulu.apk

      - name: Upload temporary APK
        uses: actions/upload-artifact@v4
        with:
          name: Lulu-APK-${{ github.sha }}
          path: apk-artifacts/Lulu.apk
          if-no-files-found: error
          retention-days: 7

      - name: Validate release number
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_NUMBER: ${{ inputs.release_number }}
        run: |
          [[ "$RELEASE_NUMBER" =~ ^[1-9][0-9]*$ ]] || {
            echo '发布编号必须是从 1 开始的正整数。'
            exit 1
          }

      - name: Publish Lulu release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NUMBER: ${{ inputs.release_number }}
        run: |
          set -euo pipefail
          tag="lulu-v${RELEASE_NUMBER}"
          gh release create "$tag" apk-artifacts/Lulu.apk \
            --title "Lulu v${RELEASE_NUMBER}" \
            --notes "Lulu v${RELEASE_NUMBER}，构建自 ${GITHUB_SHA}."

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: APK-failure-${{ github.sha }}
          path: ci-logs/*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Create failure issue
        if: failure()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const lines = fs.existsSync('ci-logs/build.log')
              ? fs.readFileSync('ci-logs/build.log', 'utf8').split(/\r?\n/)
              : []
            const pattern = /(^e: |FAILURE:|What went wrong:|Execution failed|Compilation error|Unresolved reference|error:|Exception|BUILD FAILED)/i
            const selected = lines.filter(line => pattern.test(line)).slice(-100)
            const summary = (selected.length ? selected : lines.slice(-120)).join('\n').slice(-7000)
            const shortSha = context.sha.slice(0, 7)
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI] APK build failed on ${shortSha}`,
              body: [
                `<!-- lulu-ci-failure:${context.sha} -->`,
                '## Lulu APK 自动构建失败',
                '',
                `- **运行：** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `- **提交：** ${shortSha}`,
                '',
                '```text',
                summary || 'Workflow failed before a Gradle log was produced.',
                '```'
              ].join('\n')
            })