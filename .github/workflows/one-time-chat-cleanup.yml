name: One-time chat cleanup

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/one-time-chat-cleanup.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Apply focused source changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')

          def read(path):
              return (root / path).read_text(encoding='utf-8')

          def write(path, text):
              (root / path).write_text(text, encoding='utf-8')

          def replace_once(path, old, new):
              text = read(path)
              if old not in text:
                  raise SystemExit(f'Missing expected block in {path}: {old[:120]!r}')
              write(path, text.replace(old, new, 1))

          # 1) Remove the automatic conversation-suggestion feature end to end.
          conversation = 'app/src/main/java/me/rerere/rikkahub/data/model/Conversation.kt'
          replace_once(conversation, '    val chatSuggestions: List<String> = emptyList(),\n', '')

          port = 'app/src/main/java/me/rerere/rikkahub/service/CompanionChatPort.kt'
          replace_once(port, '    suspend fun generateSuggestion(conversationId: Uuid, conversation: Conversation)\n', '')
          replace_once(
              port,
              '    override suspend fun generateSuggestion(conversationId: Uuid, conversation: Conversation) =\n        chatService.generateSuggestion(conversationId, conversation)\n',
              '',
          )

          vm = 'app/src/main/java/me/rerere/rikkahub/ui/pages/chat/ChatVM.kt'
          text = read(vm)
          text, count = re.subn(
              r'\n    fun generateSuggestion\(conversation: Conversation\) \{\n        viewModelScope\.launch \{\n            chatService\.generateSuggestion\(_conversationId, conversation\)\n        \}\n    \}\n',
              '\n',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('Unable to remove ChatVM.generateSuggestion')
          write(vm, text)

          service = 'app/src/main/java/me/rerere/rikkahub/service/ChatService.kt'
          text = read(service)
          text, count = re.subn(
              r'\n    // ---- 生成建议 ----\n.*?\n    // ---- 压缩对话历史 ----',
              '\n    // ---- 压缩对话历史 ----',
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('Unable to remove ChatService suggestion generator')
          text = re.sub(r'\n\s*chatSuggestions\s*=\s*emptyList\(\),?', '', text)
          write(service, text)

          chat_page = 'app/src/main/java/me/rerere/rikkahub/ui/pages/chat/ChatPage.kt'
          text = read(chat_page)
          text, count = re.subn(
              r'\n\s*onClickSuggestion = \{ suggestion ->\n\s*inputState\.editingMessage = null\n\s*inputState\.setMessageText\(suggestion\)\n\s*\},',
              '',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('Unable to remove ChatPage suggestion click route')
          write(chat_page, text)

          chat_list = 'app/src/main/java/me/rerere/rikkahub/ui/pages/chat/ChatList.kt'
          text = read(chat_list)
          text = text.replace('    onClickSuggestion: (String) -> Unit = {},\n', '')
          text = text.replace('                onClickSuggestion = onClickSuggestion,\n', '')
          text = text.replace('    onClickSuggestion: (String) -> Unit,\n', '')
          text, count = re.subn(
              r'\n\s*// Suggestion\n\s*if \(conversation\.chatSuggestions\.isNotEmpty\(\) && !captureProgress\) \{\n\s*ChatSuggestionsRow\(\n\s*conversation = conversation,\n\s*onClickSuggestion = onClickSuggestion,\n\s*modifier = Modifier\.align\(Alignment\.BottomCenter\)\n\s*\)\n\s*\}',
              '',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('Unable to remove ChatSuggestionsRow usage')
          # Remove the now-unused composable implementation if it lives in this file.
          text = re.sub(
              r'\n@Composable\nprivate fun ChatSuggestionsRow\(.*?(?=\n@Composable\n|\Z)',
              '\n',
              text,
              flags=re.S,
          )
          write(chat_list, text)

          prefs = 'app/src/main/java/me/rerere/rikkahub/data/datastore/PreferencesStore.kt'
          text = read(prefs)
          for line in [
              'import me.rerere.rikkahub.data.ai.prompts.DEFAULT_SUGGESTION_PROMPT\n',
              '        val SUGGESTION_MODEL = stringPreferencesKey("suggestion_model")\n',
              '        val SUGGESTION_PROMPT = stringPreferencesKey("suggestion_prompt")\n',
              '                suggestionModelId = preferences[SUGGESTION_MODEL]?.let { Uuid.parse(it) }\n                    ?: DEFAULT_AUTO_MODEL_ID,\n',
              '                suggestionPrompt = preferences[SUGGESTION_PROMPT] ?: DEFAULT_SUGGESTION_PROMPT,\n',
              '            preferences[SUGGESTION_MODEL] = settings.suggestionModelId.toString()\n',
              '            preferences[SUGGESTION_PROMPT] = settings.suggestionPrompt\n',
              '    val suggestionModelId: Uuid = Uuid.random(),\n',
              '    val suggestionPrompt: String = DEFAULT_SUGGESTION_PROMPT,\n',
          ]:
              if line not in text:
                  raise SystemExit(f'Missing suggestion settings line: {line!r}')
              text = text.replace(line, '', 1)
          write(prefs, text)

          model_page = 'app/src/main/java/me/rerere/rikkahub/ui/pages/setting/SettingModelPage.kt'
          text = read(model_page)
          for line in [
              'import me.rerere.hugeicons.stroke.MessageMultiple01\n',
              'import me.rerere.rikkahub.data.ai.prompts.DEFAULT_SUGGESTION_PROMPT\n',
              '                        ModelSettingSection.SUGGESTION -> DefaultSuggestionModelSetting(settings = settings, vm = vm)\n',
              '    SUGGESTION,\n',
              '    ModelSettingSection.SUGGESTION,\n',
          ]:
              text = text.replace(line, '')
          text, count = re.subn(
              r'\n@Composable\nprivate fun DefaultSuggestionModelSetting\(.*?(?=\n@Composable\n)',
              '\n',
              text,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('Unable to remove DefaultSuggestionModelSetting')
          write(model_page, text)

          prompt_file = root / 'app/src/main/java/me/rerere/rikkahub/data/ai/prompts/Suggestion.kt'
          if not prompt_file.exists():
              raise SystemExit('Suggestion prompt file is missing unexpectedly')
          prompt_file.unlink()

          # Remove suggestion-only string resources while preserving unrelated wording.
          for xml in (root / 'app/src/main/res').glob('values*/strings.xml'):
              text = xml.read_text(encoding='utf-8')
              text = re.sub(r'^\s*<string name="[^"]*suggestion[^"]*">.*?</string>\s*\n?', '', text, flags=re.M)
              xml.write_text(text, encoding='utf-8')

          # 2) Remove the double bottom inset between the input panel and an open keyboard.
          chat_input = 'app/src/main/java/me/rerere/rikkahub/ui/components/ai/ChatInput.kt'
          text = read(chat_input)
          text = text.replace('val imeVisile = WindowInsets.isImeVisible', 'val imeVisible = WindowInsets.isImeVisible')
          text = text.replace('LaunchedEffect(imeVisile, showInjectionSheet, showCompressDialog)', 'LaunchedEffect(imeVisible, showInjectionSheet, showCompressDialog)')
          text = text.replace('if (imeVisile && !showInjectionSheet && !showCompressDialog)', 'if (imeVisible && !showInjectionSheet && !showCompressDialog)')
          old = '''            modifier = modifier
                .imePadding()
                .navigationBarsPadding()
                .padding(horizontal = 8.dp),'''
          new = '''            modifier = modifier
                .imePadding()
                .then(if (imeVisible) Modifier else Modifier.navigationBarsPadding())
                .padding(horizontal = 8.dp),'''
          if old not in text:
              raise SystemExit('Unable to locate ChatInput bottom inset chain')
          text = text.replace(old, new, 1)
          write(chat_input, text)

          # 3) Make automatic bubble splitting less fragmented.
          splitter = 'app/src/main/java/me/rerere/rikkahub/data/ai/transformers/LuluExpressionOutputTransformer.kt'
          text = read(splitter)
          text = text.replace(
              '    val maxBubbles = if (usesParagraphRhythm) 4 else 3',
              '    val maxBubbles = 3',
              1,
          )
          old = '''                last == null -> acc += segment
                segment.length < 5 && last.length + segment.length <= 22 -> acc[acc.lastIndex] = "$last$segment"'''
          new = '''                last == null -> acc += segment
                last.visualBubbleLength() <= 8 &&
                    last.visualBubbleLength() + segment.visualBubbleLength() <= 48 -> {
                    acc[acc.lastIndex] = "$last\n$segment"
                }
                segment.length < 5 && last.length + segment.length <= 22 -> acc[acc.lastIndex] = "$last$segment"'''
          if old not in text:
              raise SystemExit('Unable to locate bubble folding rules')
          text = text.replace(old, new, 1)
          text = text.replace(
              '    "但", "不过", "可是", "只是", "而且", "所以", "因为",\n',
              '    "但", "不过", "可是", "只是", "而且", "所以", "因为",\n    "等等", "等一下", "先等等", "话说回来",\n',
              1,
          )
          write(splitter, text)

          # Remove obsolete suggestion tests if any and ensure no production route remains.
          for path in root.rglob('*Suggestion*Test.kt'):
              path.unlink()

          remaining = []
          needles = [
              'generateSuggestion', 'chatSuggestions', 'suggestionModelId', 'suggestionPrompt',
              'DEFAULT_SUGGESTION_PROMPT', 'SUGGESTION_MODEL', 'SUGGESTION_PROMPT',
              'ModelSettingSection.SUGGESTION', 'ChatSuggestionsRow',
          ]
          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts:
                  continue
              if path.suffix not in {'.kt', '.kts', '.xml', '.json', '.md'}:
                  continue
              try:
                  body = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              for needle in needles:
                  if needle in body:
                      remaining.append(f'{path}: {needle}')
          if remaining:
              raise SystemExit('Suggestion route still has references:\n' + '\n'.join(remaining[:100]))

          workflow = root / '.github/workflows/one-time-chat-cleanup.yml'
          workflow.unlink()
          PY

      - name: Compile focused Android production sources
        run: ./gradlew :app:compileReleaseKotlin --no-daemon

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: clean chat bubbles input spacing and suggestions"
          git pull --rebase origin master
          git push origin HEAD:master
