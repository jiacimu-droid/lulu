name: Apply memory boundary and suggestion cleanup

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/fix-memory-boundaries-and-remove-suggestions.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-memory-boundaries-master
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Patch memory extraction
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def load(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def save(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          extractor_path = "app/src/main/java/me/rerere/rikkahub/data/service/AffectiveMemoryExtractor.kt"
          extractor = load(extractor_path)
          additions = []
          if "private fun String.extractJsonPayload()" not in extractor:
              additions.append(r'''
private fun String.extractJsonPayload(): String {
    val trimmed = trim()
    if (trimmed.startsWith("{") || trimmed.startsWith("[")) return trimmed
    val fenced = Regex("```(?:json)?\\s*([\\s\\S]*?)```")
        .find(trimmed)?.groupValues?.getOrNull(1)?.trim()
    if (!fenced.isNullOrBlank()) return fenced
    val start = listOf(trimmed.indexOf('{'), trimmed.indexOf('['))
        .filter { it >= 0 }
        .minOrNull()
        ?: return trimmed
    val end = maxOf(trimmed.lastIndexOf('}'), trimmed.lastIndexOf(']'))
    return if (end >= start) trimmed.substring(start, end + 1) else trimmed
}
''')
          declarations = {
              "MAX_MEMORIES_PER_BATCH": "private const val MAX_MEMORIES_PER_BATCH = 6",
              "DETERMINISTIC_BOUNDARY_MARKERS": 'private val DETERMINISTIC_BOUNDARY_MARKERS = listOf("我不希望", "我不喜欢", "不要再", "别再", "不许")',
              "DETERMINISTIC_CORRECTION_MARKERS": 'private val DETERMINISTIC_CORRECTION_MARKERS = listOf("不是这样的", "不是这个意思", "应该是", "纠正一下", "更正一下", "你理解错了")',
              "DETERMINISTIC_PREFERENCE_MARKERS": 'private val DETERMINISTIC_PREFERENCE_MARKERS = listOf("我更喜欢", "我喜欢", "我希望", "我想要", "对我来说")',
              "TRANSIENT_MEMORY_FAILURE_CLASS_MARKERS": 'private val TRANSIENT_MEMORY_FAILURE_CLASS_MARKERS = listOf("timeout", "connect", "rateLimit", "tooManyRequests", "serviceUnavailable")',
              "DURABLE_MEMORY_TYPES": 'private val DURABLE_MEMORY_TYPES = setOf("user_fact", "user_preference", "user_boundary", "promise", "relationship", "shared_event", "correction")',
              "FIRST_PERSON_PREFIXES": 'private val FIRST_PERSON_PREFIXES = listOf("我", "咱", "本人", "本小姐", "本少爷", "本官", "本王", "本宫", "在下", "余", "吾", "I ", "I\'m ", "I’m ")',
          }
          for name, declaration in declarations.items():
              if not re.search(rf"(?:const\s+val|val)\s+{name}\b", extractor):
                  additions.append("\n" + declaration + "\n")
          if not re.search(r"(?:const\s+val|val)\s+GENERIC_META_MEMORY_MARKERS\b", extractor):
              additions.append(r'''
private val GENERIC_META_MEMORY_MARKERS = listOf(
    "cihai_reflection", "我记得这件事。当时感觉", "复盘、收束、准备下一轮", "后续可复用的长期记忆",
    "感知世界包", "意义评估", "动态判断", "状态生成", "辞海记忆架构", "七层架构",
    "下一轮判断", "我完成了沉淀", "我整理了记忆", "以后可以参考", "等待下一次",
)
''')
          if additions:
              save(extractor_path, extractor.rstrip() + "\n" + "".join(additions) + "\n")

          planner_path = "app/src/main/java/me/rerere/rikkahub/data/service/AffectiveMemoryExtractionPlanner.kt"
          planner = load(planner_path)
          new_function = r'''fun buildAffectiveMemoryExtractionPlan(
    messageNodes: List<MessageNode>,
    processedSourceNodeIds: Set<String>,
    extractionInterval: Int = DEFAULT_MEMORY_EXTRACTION_INTERVAL,
    protectedRecentCount: Int = DEFAULT_MEMORY_EXTRACTION_PROTECTED_RECENT_COUNT,
    direction: MemoryExtractionDirection = MemoryExtractionDirection.OLDEST_FIRST,
    requireExactBoundary: Boolean = true,
): AffectiveMemoryExtractionPlan? {
    if (extractionInterval <= 0) return null
    val logicalTurns = messageNodes.toMemoryExtractionTurns()
    val stableTurns = logicalTurns.dropLast(protectedRecentCount.coerceAtLeast(0))
    if (stableTurns.size < extractionInterval) return null

    val completeWindows = stableTurns
        .chunked(extractionInterval)
        .filter { window -> window.size == extractionInterval }

    if (requireExactBoundary) {
        // Automatic extraction only fires at 40, 80, 120... stable messages.
        // Intermediate messages never create a sliding or overlapping batch.
        if (stableTurns.size % extractionInterval != 0) return null
        val boundaryWindow = completeWindows.lastOrNull() ?: return null
        if (boundaryWindow.all { turn -> turn.nodeId in processedSourceNodeIds }) return null
        return AffectiveMemoryExtractionPlan(
            turns = boundaryWindow,
            reason = if (direction == MemoryExtractionDirection.RECENT_FIRST) "recent_interval" else "interval",
        )
    }

    // Manual history continuation can catch up old batches, but every batch remains
    // aligned to 1..N, N+1..2N and never combines fragments from different windows.
    val pendingWindows = completeWindows.filter { window ->
        window.any { turn -> turn.nodeId !in processedSourceNodeIds }
    }
    if (pendingWindows.isEmpty()) return null
    val selectedTurns = when (direction) {
        MemoryExtractionDirection.OLDEST_FIRST -> pendingWindows.first()
        MemoryExtractionDirection.RECENT_FIRST -> pendingWindows.last()
    }
    return AffectiveMemoryExtractionPlan(
        turns = selectedTurns,
        reason = if (direction == MemoryExtractionDirection.RECENT_FIRST) "recent_interval" else "interval",
    )
}'''
          pattern = re.compile(
              r"fun buildAffectiveMemoryExtractionPlan\([\s\S]*?\n}\n\ninternal fun List<MessageNode>\.toMemoryExtractionTurns",
          )
          updated, count = pattern.subn(new_function + "\n\ninternal fun List<MessageNode>.toMemoryExtractionTurns", planner, count=1)
          if count != 1:
              raise SystemExit(f"Unable to replace memory planner function: matches={count}")
          save(planner_path, updated)

          test_path = "app/src/test/java/me/rerere/rikkahub/data/service/AffectiveMemoryExtractionPlannerTest.kt"
          tests = load(test_path)
          tests = tests.replace(
              "fun `planner selects the next unprocessed interval without overlap`() {\n        val conversation = nodes(56)",
              "fun `planner selects the next unprocessed interval without overlap`() {\n        val conversation = nodes(50)",
          )
          tests = tests.replace(
              "            extractionInterval = 40,\n            direction = MemoryExtractionDirection.RECENT_FIRST,\n        )",
              "            extractionInterval = 40,\n            direction = MemoryExtractionDirection.RECENT_FIRST,\n            requireExactBoundary = false,\n        )",
              1,
          )
          if "automatic planner only triggers on exact configured boundaries" not in tests:
              marker = "    @Test\n    fun `planner uses role configured interval and zero disables automatic extraction`() {"
              exact_test = '''    @Test
    fun `automatic planner only triggers on exact configured boundaries`() {
        val firstBoundary = buildAffectiveMemoryExtractionPlan(
            messageNodes = nodes(50),
            processedSourceNodeIds = emptySet(),
            extractionInterval = 40,
            protectedRecentCount = 10,
        )
        requireNotNull(firstBoundary)
        assertEquals(idOf(1), firstBoundary.turns.first().nodeId)
        assertEquals(idOf(40), firstBoundary.turns.last().nodeId)

        assertEquals(
            null,
            buildAffectiveMemoryExtractionPlan(
                messageNodes = nodes(51),
                processedSourceNodeIds = (1..40).map { idOf(it) }.toSet(),
                extractionInterval = 40,
                protectedRecentCount = 10,
            ),
        )

        val secondBoundary = buildAffectiveMemoryExtractionPlan(
            messageNodes = nodes(90),
            processedSourceNodeIds = (1..40).map { idOf(it) }.toSet(),
            extractionInterval = 40,
            protectedRecentCount = 10,
        )
        requireNotNull(secondBoundary)
        assertEquals(idOf(41), secondBoundary.turns.first().nodeId)
        assertEquals(idOf(80), secondBoundary.turns.last().nodeId)
    }

'''
              if marker not in tests:
                  raise SystemExit("Planner test marker missing")
              tests = tests.replace(marker, exact_test + marker, 1)
          save(test_path, tests)

          chat_path = "app/src/main/java/me/rerere/rikkahub/service/ChatService.kt"
          chat = load(chat_path)
          if "activeMemoryExtractionConversations" not in chat:
              chat = chat.replace(
                  "private const val MEMORY_OCCURRENCE_FUTURE_TOLERANCE_MS = 24L * 60 * 60 * 1_000\n",
                  "private const val MEMORY_OCCURRENCE_FUTURE_TOLERANCE_MS = 24L * 60 * 60 * 1_000\n"
                  "private val activeMemoryExtractionConversations = ConcurrentHashMap.newKeySet<Uuid>()\n",
                  1,
              )
          chat = chat.replace(
              "                        direction = direction,\n                    ) ?: break",
              "                        direction = direction,\n                        requireExactBoundary = false,\n                    ) ?: break",
              1,
          )
          chat = chat.replace(
              "                        includeSavedMemorySources = includeSavedMemories,\n                    ).join()",
              "                        includeSavedMemorySources = includeSavedMemories,\n                        requireExactBoundary = false,\n                    ).join()",
              1,
          )
          chat = chat.replace(
              "        includeSavedMemorySources: Boolean = true,\n    ): Job = appScope.launch {\n            val extractionStartedAt = System.nanoTime()",
              "        includeSavedMemorySources: Boolean = true,\n        requireExactBoundary: Boolean = true,\n    ): Job = appScope.launch {\n            if (!activeMemoryExtractionConversations.add(conversationId)) {\n                Logging.log(TAG, \"Memory extraction already running for conversation=$conversationId\")\n                return@launch\n            }\n            try {\n            val extractionStartedAt = System.nanoTime()",
              1,
          )
          chat = chat.replace(
              "                    direction = direction,\n                ) ?: return@runCatching",
              "                    direction = direction,\n                    requireExactBoundary = requireExactBoundary,\n                ) ?: return@runCatching",
              1,
          )
          chat = chat.replace(
              "            PerformanceMonitor.recordNanos(\"Memory Extraction\", extractionStartedAt, assistant.name)\n        }\n\n\n    // ---- 检查无效消息 ----",
              "            PerformanceMonitor.recordNanos(\"Memory Extraction\", extractionStartedAt, assistant.name)\n            } finally {\n                activeMemoryExtractionConversations.remove(conversationId)\n            }\n        }\n\n\n    // ---- 检查无效消息 ----",
              1,
          )
          required = [
              "requireExactBoundary: Boolean = true",
              "requireExactBoundary = false",
              "activeMemoryExtractionConversations.add(conversationId)",
              "activeMemoryExtractionConversations.remove(conversationId)",
          ]
          missing = [item for item in required if item not in chat]
          if missing:
              raise SystemExit(f"ChatService patch incomplete: {missing}")
          save(chat_path, chat)
          PY

      - name: Remove suggestion replies from every active layer
        run: |
          cat > /tmp/code-index.yml <<'INDEXYAML'
          name: Refresh code index
          on:
            push:
              branches: [master]
              paths-ignore:
                - "docs/architecture/CODE_INDEX.md"
                - "docs/architecture/code-index.json"
            workflow_dispatch:
          permissions:
            contents: write
          concurrency:
            group: code-index-master
            cancel-in-progress: true
          jobs:
            refresh:
              if: ${{ !contains(github.event.head_commit.message || '', '[skip index]') }}
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                  with:
                    fetch-depth: 1
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"
                - name: Generate repository index
                  env:
                    INDEX_COMMIT: ${{ github.sha }}
                    INDEX_BRANCH: ${{ github.ref_name }}
                  run: |
                    python3 scripts/generate_code_index.py
                    python3 scripts/enrich_code_index.py
                - name: Commit refreshed index
                  run: |
                    if [ -z "$(git status --porcelain -- docs/architecture/CODE_INDEX.md docs/architecture/code-index.json)" ]; then exit 0; fi
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                    git add --force docs/architecture/CODE_INDEX.md docs/architecture/code-index.json
                    git commit -m "docs: refresh code index [skip ci] [skip index]"
                    git pull --rebase origin master
                    git push origin HEAD:master
          INDEXYAML
          export ORIGINAL_INDEX_WORKFLOW_B64="$(base64 -w0 /tmp/code-index.yml)"
          python3 .github/scripts/cleanup_suggestion_chain.py

      - name: Commit complete fix to master
        run: |
          rm -f .github/workflows/fix-memory-boundaries-and-remove-suggestions.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: exact memory batches and remove suggestion replies"
          git pull --rebase origin master
          git push origin HEAD:master
