name: One-time requested call tool

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/one-time-chat-call-tool.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Add requested incoming-call tool
        shell: python
        run: |
          from pathlib import Path

          path = Path('app/src/main/java/me/rerere/rikkahub/service/ChatService.kt')
          text = path.read_text(encoding='utf-8')

          import_anchor = 'import me.rerere.rikkahub.data.voicecall.VoiceCallStreamSegmenter\n'
          import_line = 'import me.rerere.rikkahub.data.voicecall.ProactiveCallManager\n'
          if import_line not in text:
              if import_anchor not in text:
                  raise RuntimeError('VoiceCallStreamSegmenter import anchor not found')
              text = text.replace(import_anchor, import_line + import_anchor, 1)

          tools_anchor = '''        add(createTodayStudyPlanTool(assistant.id.toString(), assistant.name))
          add(createCompanionGameTool(assistant.id.toString()))
          conversationId?.let { add(createFavoriteCurrentUserMessageTool(it)) }
          '''
          tools_replacement = '''        add(createTodayStudyPlanTool(assistant.id.toString(), assistant.name))
          add(createCompanionGameTool(assistant.id.toString()))
          conversationId?.let {
              add(createFavoriteCurrentUserMessageTool(it))
              add(createRequestedIncomingCallTool(assistant, it))
          }
          '''
          if 'createRequestedIncomingCallTool(assistant, it)' not in text:
              if tools_anchor not in text:
                  raise RuntimeError('buildAvailableTools anchor not found')
              text = text.replace(tools_anchor, tools_replacement, 1)

          function_anchor = '''    private fun createFavoriteCurrentUserMessageTool(conversationId: Uuid): Tool = Tool(
          '''
          function_code = '''    private fun createRequestedIncomingCallTool(
              assistant: Assistant,
              conversationId: Uuid,
          ): Tool = Tool(
              name = "place_voice_call",
              description = "Place a real incoming voice call from this character to the user. Use when the user explicitly asks the character to call, phone, ring, or start a voice call now. Do not merely promise to call after this tool succeeds. Explicit user requests are allowed even when random proactive-call scheduling is disabled or cooling down.",
              execute = { input ->
                  val reason = input["reason"]
                      ?.jsonPrimitive
                      ?.contentOrNull
                      ?.trim()
                      ?.takeIf(String::isNotBlank)
                      ?: "用户明确邀请当前角色发起语音通话"
                  val offered = ProactiveCallManager.offerIncomingCall(
                      context = context,
                      assistantId = assistant.id.toString(),
                      assistantName = assistant.name.ifBlank { "当前角色" },
                      conversationId = conversationId.toString(),
                      reason = reason,
                      setting = assistant.proactiveCallSetting,
                      force = true,
                  )
                  listOf(
                      UIMessagePart.Text(
                          if (offered) {
                              "{\\"success\\":true,\\"status\\":\\"incoming_call_started\\"}"
                          } else {
                              "{\\"success\\":false,\\"status\\":\\"incoming_call_blocked\\",\\"message\\":\\"系统未允许显示来电，请检查通知、全屏通知或后台弹出权限\\"}"
                          }
                      )
                  )
              },
          )

          '''
          if 'private fun createRequestedIncomingCallTool(' not in text:
              if function_anchor not in text:
                  raise RuntimeError('favorite tool function anchor not found')
              text = text.replace(function_anchor, function_code + function_anchor, 1)

          path.write_text(text, encoding='utf-8', newline='\n')
          Path('.github/workflows/one-time-chat-call-tool.yml').unlink()

      - name: Compile release Kotlin
        run: ./gradlew :app:compileReleaseKotlin --no-daemon --stacktrace

      - name: Commit verified call tool
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: allow characters to place requested voice calls"
          git pull --rebase origin master
          git push origin HEAD:master
