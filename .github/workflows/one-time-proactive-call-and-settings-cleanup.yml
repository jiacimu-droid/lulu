name: One-time proactive call and settings cleanup

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/one-time-proactive-call-and-settings-cleanup.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Patch proactive call routing and settings entry
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          # Increase the phone-channel tendency only after the persona planner has
          # already decided to reach out now. Persona, quiet hours, cooldown and
          # network constraints remain unchanged.
          call_path = Path('app/src/main/java/me/rerere/rikkahub/data/datastore/ProactiveMessageSetting.kt')
          call = call_path.read_text(encoding='utf-8')
          old = '''    val chancePercent = when (setting.frequency) {
              ProactiveCallFrequency.OCCASIONAL -> 15
              ProactiveCallFrequency.NORMAL -> 30
              ProactiveCallFrequency.FREQUENT -> 50
          }
          '''
          new = '''    val chancePercent = when (setting.frequency) {
              // This choice happens only after the role has already decided to contact now.
              // Keep occasional conservative, while making normal/frequent genuinely reachable.
              ProactiveCallFrequency.OCCASIONAL -> 30
              ProactiveCallFrequency.NORMAL -> 65
              ProactiveCallFrequency.FREQUENT -> 90
          }
          '''
          if old not in call:
              raise SystemExit('proactive call chance block not found')
          call_path.write_text(call.replace(old, new, 1), encoding='utf-8')

          # Remove the duplicate settings-page entry that navigates to the same
          # Stats/Performance console already exposed on the desktop.
          removed = []
          for path in Path('app/src/main/java/me/rerere/rikkahub/ui/pages/setting').rglob('*.kt'):
              text = path.read_text(encoding='utf-8')
              cursor = 0
              changed = False
              while True:
                  hit = text.find('Screen.Stats', cursor)
                  if hit < 0:
                      break
                  start = text.rfind('item(', 0, hit)
                  if start < 0:
                      cursor = hit + 1
                      continue
                  depth = 0
                  end = None
                  in_string = False
                  escape = False
                  for i in range(start + len('item'), len(text)):
                      ch = text[i]
                      if in_string:
                          if escape:
                              escape = False
                          elif ch == '\\':
                              escape = True
                          elif ch == '"':
                              in_string = False
                          continue
                      if ch == '"':
                          in_string = True
                      elif ch == '(':
                          depth += 1
                      elif ch == ')':
                          depth -= 1
                          if depth == 0:
                              end = i + 1
                              break
                  if end is None:
                      raise SystemExit(f'unbalanced settings item in {path}')
                  block = text[start:end]
                  context = text[max(0, start-200):min(len(text), end+200)]
                  if any(marker in block + context for marker in ('性能监测', 'Token 控制台', '性能检测', 'Stats')):
                      while end < len(text) and text[end] in ' \t':
                          end += 1
                      if end < len(text) and text[end] == ',':
                          end += 1
                      if end < len(text) and text[end] == '\r':
                          end += 1
                      if end < len(text) and text[end] == '\n':
                          end += 1
                      text = text[:start] + text[end:]
                      removed.append(str(path))
                      changed = True
                      cursor = start
                  else:
                      cursor = hit + 1
              if changed:
                  path.write_text(text, encoding='utf-8')

          if not removed:
              raise SystemExit('duplicate settings Stats entry was not found')
          print('removed duplicate stats entry from:', sorted(set(removed)))

          Path('.github/workflows/one-time-proactive-call-and-settings-cleanup.yml').unlink()
          PY

      - name: Compile release Kotlin
        run: ./gradlew :app:compileReleaseKotlin --no-daemon --stacktrace

      - name: Commit verified changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: make proactive calls reachable and remove duplicate console entry"
          git pull --rebase origin master
          git push origin HEAD:master
