name: Apply memory diagnostics UI

on:
  push:
    branches: [master]
    paths:
      - scripts/apply_memory_diagnostics_ui.py
      - .github/workflows/apply-memory-diagnostics-ui.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-memory-diagnostics-ui
  cancel-in-progress: false

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply diagnostics UI patch
        run: python3 scripts/apply_memory_diagnostics_ui.py

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run focused unit tests
        run: ./gradlew :app:testDebugUnitTest --tests '*MemoryDiagnosticsTest' --tests '*CompanionCommitmentReducerTest' --stacktrace

      - name: Compile debug Kotlin
        run: ./gradlew :app:compileDebugKotlin --stacktrace

      - name: Commit applied changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/me/rerere/rikkahub/ui/pages/memory/MemoryBankVM.kt \
                  app/src/main/java/me/rerere/rikkahub/ui/pages/memory/MemoryBankPage.kt
          git commit -m "feat: connect memory diagnostics to UI [skip index]"
          git pull --rebase origin master
          git push origin HEAD:master
