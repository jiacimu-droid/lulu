name: One-time bubble split v3

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/one-time-bubble-split-v3.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Tune bubble splitting
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('app/src/main/java/me/rerere/rikkahub/data/ai/transformers/LuluExpressionOutputTransformer.kt')
          text = path.read_text(encoding='utf-8')

          text = re.sub(
              r'val maxBubbles = if \(usesParagraphRhythm\) 4 else 3|val maxBubbles = 3',
              'val maxBubbles = if (usesParagraphRhythm) 6 else 5',
              text,
              count=1,
          )

          text = re.sub(
              r'''\s*last\.visualBubbleLength\(\) <= 8 &&\n\s*last\.visualBubbleLength\(\) \+ segment\.visualBubbleLength\(\) <= 48 -> \{\n\s*acc\[acc\.lastIndex\] = "\$last\\n\$segment"\n\s*\}\n''',
              '',
              text,
              count=1,
          )

          text = text.replace(
              '                segment.length < 5 && last.length + segment.length <= 22 -> acc[acc.lastIndex] = "$last$segment"',
              '                segment.visualBubbleLength() <= 2 &&\n                    last.visualBubbleLength() + segment.visualBubbleLength() <= 18 -> {\n                    acc[acc.lastIndex] = "$last$segment"\n                }',
              1,
          )

          text = text.replace(
              '                    "$last\n$segment"',
              '                    "$last\n$segment"',
              1,
          )

          text = text.replace(
              '                previous.visualBubbleLength() + bubble.visualBubbleLength() <= 48',
              '                previous.visualBubbleLength() + bubble.visualBubbleLength() <= 24',
              1,
          )

          text = text.replace(
              '                previous.visualBubbleLength() + unit.visualBubbleLength() <= 44 -> {',
              '                previous.visualBubbleLength() + unit.visualBubbleLength() <= 22 -> {',
              1,
          )

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/one-time-bubble-split-v3.yml').unlink()
          PY

      - name: Compile Android production sources
        run: ./gradlew :app:compileReleaseKotlin --no-daemon

      - name: Commit bubble split tuning
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: prefer one sentence per chat bubble"
          git pull --rebase origin master
          git push origin HEAD:master
