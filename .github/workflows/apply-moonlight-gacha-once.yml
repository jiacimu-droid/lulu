name: Apply moonlight gacha once

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/apply-moonlight-gacha-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install web dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Apply gacha rules and moonlight skin
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'missing anchor: {label}')
              return text.replace(old, new, 1)

          rules_path = Path('app/src/main/java/me/rerere/rikkahub/data/study/StudyRules.kt')
          rules = rules_path.read_text(encoding='utf-8')

          rules = replace_once(
              rules,
              '''        val purpleDrawsToday = if (state.dailyPurpleDrawDate == date) state.dailyPurpleDrawCount else 0
          val drawsToday = if (state.dailyPurpleDrawDate == date) state.dailyDrawCount else 0
          val grantPurpleSafety = todayRecord.studyMinutes + studiedMinutes >= 120 &&
              drawsToday >= 30 &&
              purpleDrawsToday == 0 &&''',
              '''        val specialDrawsToday = if (state.dailyPurpleDrawDate == date) state.dailyPurpleDrawCount else 0
          val drawsToday = if (state.dailyPurpleDrawDate == date) state.dailyDrawCount else 0
          val grantPurpleSafety = todayRecord.studyMinutes + studiedMinutes >= 120 &&
              drawsToday >= 30 &&
              specialDrawsToday == 0 &&''',
              'pomodoro safety count',
          )

          rules = replace_once(
              rules,
              '''        val purpleCount = generatedResults.count { it.rarity == StudyRarity.Rare }
          val nextPurpleCount = previousPurpleCount + purpleCount
          val nextDrawCount = previousDrawCount + generatedResults.size
          val studiedToday = state.dailyStudyRecords[drawDate]?.studyMinutes ?: 0
          val grantPurpleSafety = studiedToday >= 120 &&
              nextDrawCount >= 30 &&
              nextPurpleCount == 0 &&''',
              '''        // Keep the persisted field for data compatibility, but count every non-blue result.
          // A purple, gold, or rainbow pull is already a successful special reward and blocks
          // the extra daily safety purple.
          val specialCount = generatedResults.count { it.rarity != StudyRarity.Normal }
          val nextSpecialCount = previousPurpleCount + specialCount
          val nextDrawCount = previousDrawCount + generatedResults.size
          val studiedToday = state.dailyStudyRecords[drawDate]?.studyMinutes ?: 0
          val grantPurpleSafety = studiedToday >= 120 &&
              nextDrawCount >= 30 &&
              nextSpecialCount == 0 &&''',
              'draw safety count',
          )
          rules = replace_once(
              rules,
              '                dailyPurpleDrawCount = nextPurpleCount,',
              '                dailyPurpleDrawCount = nextSpecialCount,',
              'persist special count',
          )

          rules = replace_once(
              rules,
              '''            roll < 0.9215 -> {
                  val outfit = outfitNames[random.nextInt(outfitNames.size)]
                  val part = outfitParts[random.nextInt(outfitParts.size)]
                  StudyDrawResult(StudyRarity.Normal, "normal:$outfit:$part", "$outfit-$part 碎片")
              }
              roll < 0.9815 -> drawRare(random)
              roll < 0.9965 -> if (random.nextDouble() < 0.8) {''',
              '''            roll < 0.94 -> {
                  val outfit = outfitNames[random.nextInt(outfitNames.size)]
                  val part = outfitParts[random.nextInt(outfitParts.size)]
                  StudyDrawResult(StudyRarity.Normal, "normal:$outfit:$part", "$outfit-$part 碎片")
              }
              roll < 0.988 -> drawRare(random)
              roll < 0.998 -> if (random.nextDouble() < 0.8) {''',
              'gacha probability thresholds',
          )
          rules = rules.replace('今日零紫安全抽', '今日安全抽')
          rules_path.write_text(rules, encoding='utf-8')

          page_path = Path('app/src/main/java/me/rerere/rikkahub/ui/pages/study/StudyPage.kt')
          page = page_path.read_text(encoding='utf-8')

          gacha_block = r'''@Composable
          private fun GachaCard(
              state: StudyState,
              onSingle: () -> Unit,
              onTen: () -> Unit,
              onPurple: () -> Unit,
          ) {
              val singleCost = if (StudyRules.hasSingleDrawDiscount(state)) StudyRules.DISCOUNT_SINGLE_DRAW_COST else StudyRules.SINGLE_DRAW_COST
              val ticketDraws = state.wallet.singleDrawTickets + state.wallet.tenDrawTickets * 10
              val pityUsed = state.drawsSinceNonNormal.coerceIn(0, StudyRules.NON_NORMAL_PITY_DRAW_COUNT)
              val pityRemaining = (StudyRules.NON_NORMAL_PITY_DRAW_COUNT - pityUsed)
                  .coerceIn(1, StudyRules.NON_NORMAL_PITY_DRAW_COUNT)
              val pityProgress = pityUsed.toFloat() / StudyRules.NON_NORMAL_PITY_DRAW_COUNT

              Card(
                  shape = RoundedCornerShape(30.dp),
                  colors = CardDefaults.cardColors(containerColor = Color(0x4D211940)),
                  elevation = CardDefaults.cardElevation(defaultElevation = 0.dp),
                  border = BorderStroke(1.dp, Color(0x66E7D9FF)),
                  modifier = Modifier.fillMaxWidth(),
              ) {
                  Box(
                      modifier = Modifier
                          .fillMaxWidth()
                          .height(790.dp)
                          .clip(RoundedCornerShape(30.dp)),
                  ) {
                      StarryLetterBackdrop(Modifier.fillMaxSize())
                      Box(
                          modifier = Modifier
                              .fillMaxSize()
                              .background(
                                  Brush.verticalGradient(
                                      0f to Color(0x221D153B),
                                      0.48f to Color(0x44291D51),
                                      1f to Color(0xE61A1431),
                                  ),
                              ),
                      )
                      Column(
                          modifier = Modifier.fillMaxSize().padding(horizontal = 20.dp, vertical = 18.dp),
                          verticalArrangement = Arrangement.spacedBy(10.dp),
                      ) {
                          Row(verticalAlignment = Alignment.CenterVertically) {
                              Surface(
                                  shape = RoundedCornerShape(999.dp),
                                  color = Color(0x557A5AA8),
                                  border = BorderStroke(1.dp, Color(0x99E1CFFF)),
                              ) {
                                  Text(
                                      "✦ 常驻卡池",
                                      color = Color(0xFFF6EEFF),
                                      style = MaterialTheme.typography.labelLarge,
                                      fontWeight = FontWeight.SemiBold,
                                      modifier = Modifier.padding(horizontal = 13.dp, vertical = 7.dp),
                                  )
                              }
                              Spacer(Modifier.weight(1f))
                              Text(
                                  "券可抽 $ticketDraws 次",
                                  color = Color.White.copy(alpha = 0.78f),
                                  style = MaterialTheme.typography.labelMedium,
                              )
                          }

                          Surface(
                              shape = RoundedCornerShape(18.dp),
                              color = Color(0x26FFFFFF),
                              border = BorderStroke(1.dp, Color(0x55FFFFFF)),
                              modifier = Modifier.fillMaxWidth(),
                          ) {
                              Row(
                                  modifier = Modifier.padding(horizontal = 16.dp, vertical = 12.dp),
                                  verticalAlignment = Alignment.CenterVertically,
                              ) {
                                  Text("❀  当前夸夸值", color = Color(0xFFE8DFFF))
                                  Spacer(Modifier.weight(1f))
                                  Text(
                                      state.wallet.kudos.toString(),
                                      color = Color(0xFFFFE6A8),
                                      style = MaterialTheme.typography.headlineSmall,
                                      fontWeight = FontWeight.Black,
                                  )
                                  Spacer(Modifier.width(6.dp))
                                  Text("✦", color = Color(0xFFFFE6A8))
                              }
                          }

                          Text(
                              "月光花匣",
                              color = Color(0xFFFFF4FF),
                              style = MaterialTheme.typography.headlineLarge,
                              fontWeight = FontWeight.Black,
                              modifier = Modifier.fillMaxWidth(),
                              textAlign = TextAlign.Center,
                          )
                          Text(
                              "把今天认真学习的心意，藏进会发光的花瓣里。",
                              color = Color(0xFFE6DDF3),
                              style = MaterialTheme.typography.bodyMedium,
                              modifier = Modifier.fillMaxWidth(),
                              textAlign = TextAlign.Center,
                          )

                          Row(
                              modifier = Modifier.fillMaxWidth(),
                              horizontalArrangement = Arrangement.spacedBy(8.dp),
                          ) {
                              Box(Modifier.weight(1f), contentAlignment = Alignment.Center) {
                                  StarryRarityPill("紫", "4.8%", Color(0xFFD3AFFF))
                              }
                              Box(Modifier.weight(1f), contentAlignment = Alignment.Center) {
                                  StarryRarityPill("金", "1.0%", Color(0xFFFFD98A))
                              }
                              Box(Modifier.weight(1f), contentAlignment = Alignment.Center) {
                                  StarryRarityPill("彩", "0.2%", Color(0xFFFFC7EC))
                              }
                          }

                          Box(
                              modifier = Modifier.weight(1f).fillMaxWidth(),
                              contentAlignment = Alignment.Center,
                          ) {
                              StarryLetterSeal()
                          }

                          Row(
                              modifier = Modifier.fillMaxWidth().horizontalScroll(rememberScrollState()),
                              horizontalArrangement = Arrangement.spacedBy(8.dp),
                          ) {
                              FragmentWalletPill("抖音20分", state.inventory.douyinFragments, Color(0xFFD3AFFF))
                              FragmentWalletPill("剧场", state.inventory.theaterFragments, Color(0xFFE6BFFF))
                              FragmentWalletPill("游戏120分", state.inventory.gameFragments, Color(0xFFFFD98A))
                              FragmentWalletPill("视频卡", state.inventory.videoFragments, Color(0xFFFFE2AA))
                              FragmentWalletPill("番剧3小时", state.inventory.animeFragments, Color(0xFFFFC7EC))
                          }

                          Text(
                              "紫色：抖音20分钟 4.0% / 剧场碎片 0.8% · 金色 1.0% · 彩色 0.2%",
                              color = Color.White.copy(alpha = 0.68f),
                              style = MaterialTheme.typography.labelSmall,
                              modifier = Modifier.fillMaxWidth(),
                              textAlign = TextAlign.Center,
                          )

                          Surface(
                              shape = RoundedCornerShape(16.dp),
                              color = Color(0x2EFFFFFF),
                              border = BorderStroke(1.dp, Color(0x55E7D7FF)),
                              modifier = Modifier.fillMaxWidth(),
                          ) {
                              Column(
                                  modifier = Modifier.padding(horizontal = 14.dp, vertical = 10.dp),
                                  verticalArrangement = Arrangement.spacedBy(7.dp),
                              ) {
                                  Row(verticalAlignment = Alignment.CenterVertically) {
                                      Text(
                                          "特殊奖励保底",
                                          color = Color(0xFFF3EAFF),
                                          style = MaterialTheme.typography.labelLarge,
                                          fontWeight = FontWeight.SemiBold,
                                      )
                                      Spacer(Modifier.weight(1f))
                                      Text(
                                          "还差 $pityRemaining 抽",
                                          color = Color(0xFFFFE2A5),
                                          style = MaterialTheme.typography.labelMedium,
                                      )
                                  }
                                  LinearProgressIndicator(
                                      progress = { pityProgress },
                                      modifier = Modifier.fillMaxWidth(),
                                  )
                                  Text(
                                      "连续全蓝第30抽保底紫色；紫、金、彩任一出现后重新计算。",
                                      color = Color.White.copy(alpha = 0.60f),
                                      style = MaterialTheme.typography.labelSmall,
                                  )
                              }
                          }

                          if (state.wallet.purpleDrawTickets > 0) {
                              Button(
                                  onClick = onPurple,
                                  colors = ButtonDefaults.buttonColors(
                                      containerColor = Color(0xFF8A63C7),
                                      contentColor = Color.White,
                                  ),
                                  modifier = Modifier.fillMaxWidth().height(48.dp),
                              ) {
                                  Text("♡ 今日安全抽 · ${state.wallet.purpleDrawTickets}张", fontWeight = FontWeight.Bold)
                              }
                          }

                          Row(horizontalArrangement = Arrangement.spacedBy(12.dp), modifier = Modifier.fillMaxWidth()) {
                              OutlinedButton(
                                  onClick = onSingle,
                                  border = BorderStroke(1.dp, Color(0xFFE4D4FF)),
                                  colors = ButtonDefaults.outlinedButtonColors(contentColor = Color.White),
                                  modifier = Modifier.weight(1f).height(54.dp),
                              ) {
                                  Text("单抽 · $singleCost", fontWeight = FontWeight.SemiBold)
                              }
                              Button(
                                  onClick = onTen,
                                  colors = ButtonDefaults.buttonColors(
                                      containerColor = Color(0xFFE5B963),
                                      contentColor = Color(0xFF2A1836),
                                  ),
                                  modifier = Modifier.weight(1f).height(54.dp),
                              ) {
                                  Text("十连 · ${StudyRules.TEN_DRAW_COST}", fontWeight = FontWeight.Black)
                              }
                          }
                          Text(
                              "✦ 每一次抽卡，都是你努力的回响。✦",
                              color = Color(0xFFDCCDF0),
                              style = MaterialTheme.typography.labelSmall,
                              modifier = Modifier.fillMaxWidth(),
                              textAlign = TextAlign.Center,
                          )
                      }
                  }
              }
          }

          @Composable
          private fun SleepHabitRewardCard'''

          page, count = re.subn(
              r'@Composable\nprivate fun GachaCard\([\s\S]*?\n}\n\n@Composable\nprivate fun SleepHabitRewardCard',
              lambda _: gacha_block,
              page,
              count=1,
          )
          if count != 1:
              raise SystemExit('failed to replace GachaCard')

          art_block = r'''@Composable
          private fun StarryLetterBackdrop(modifier: Modifier = Modifier) {
              Canvas(
                  modifier = modifier.background(
                      Brush.verticalGradient(
                          listOf(
                              Color(0xFF12153C),
                              Color(0xFF34255A),
                              Color(0xFF5B3D72),
                              Color(0xFF18152F),
                          ),
                      ),
                  ),
              ) {
                  drawCircle(
                      color = Color(0x44FFF4D8),
                      radius = size.minDimension * 0.28f,
                      center = Offset(size.width * 0.84f, size.height * 0.10f),
                  )
                  drawCircle(
                      color = Color(0x33DDBBFF),
                      radius = size.minDimension * 0.34f,
                      center = Offset(size.width * 0.18f, size.height * 0.74f),
                  )
                  val lights = listOf(
                      0.08f to 0.14f, 0.18f to 0.08f, 0.30f to 0.20f, 0.46f to 0.11f,
                      0.62f to 0.25f, 0.91f to 0.31f, 0.12f to 0.43f, 0.77f to 0.48f,
                      0.39f to 0.58f, 0.88f to 0.65f, 0.24f to 0.79f, 0.68f to 0.86f,
                  )
                  lights.forEachIndexed { index, (x, y) ->
                      drawCircle(
                          color = if (index % 4 == 0) Color(0xFFFFE3A5) else Color.White.copy(alpha = 0.72f),
                          radius = if (index % 4 == 0) 3.5f else 2.1f,
                          center = Offset(size.width * x, size.height * y),
                      )
                  }
                  repeat(9) { index ->
                      val x = size.width * (0.08f + index * 0.105f)
                      val y = size.height * (0.20f + (index % 3) * 0.08f)
                      drawCircle(
                          color = Color(0x55E9B9FF),
                          radius = 7f + (index % 3) * 2f,
                          center = Offset(x, y),
                      )
                      drawLine(
                          color = Color(0x335E3D79),
                          start = Offset(x, y - 28f),
                          end = Offset(x - 10f, y + 34f),
                          strokeWidth = 1.4f,
                      )
                  }
              }
          }

          @Composable
          private fun StarryLetterSeal() {
              val transition = rememberInfiniteTransition(label = "moonlight-flower-box")
              val pulse by transition.animateFloat(
                  initialValue = 0.94f,
                  targetValue = 1.06f,
                  animationSpec = infiniteRepeatable(tween(1_400), RepeatMode.Reverse),
                  label = "flower-glow",
              )
              Box(
                  modifier = Modifier.fillMaxWidth().height(250.dp),
                  contentAlignment = Alignment.Center,
              ) {
                  Canvas(Modifier.size(width = 310.dp, height = 230.dp)) {
                      val w = size.width
                      val h = size.height
                      drawCircle(
                          color = Color(0x22F4CCFF),
                          radius = w * 0.42f * pulse,
                          center = Offset(w * 0.50f, h * 0.56f),
                      )
                      drawCircle(
                          color = Color(0x22FFF1BB),
                          radius = w * 0.30f,
                          center = Offset(w * 0.58f, h * 0.50f),
                      )

                      val bodyLeft = w * 0.16f
                      val bodyTop = h * 0.38f
                      val bodyWidth = w * 0.68f
                      val bodyHeight = h * 0.43f
                      drawRoundRect(
                          color = Color(0x448D72C5),
                          topLeft = Offset(bodyLeft, bodyTop),
                          size = androidx.compose.ui.geometry.Size(bodyWidth, bodyHeight),
                          cornerRadius = androidx.compose.ui.geometry.CornerRadius(18f, 18f),
                      )
                      drawRoundRect(
                          color = Color(0xFFE8C889),
                          topLeft = Offset(bodyLeft, bodyTop),
                          size = androidx.compose.ui.geometry.Size(bodyWidth, bodyHeight),
                          cornerRadius = androidx.compose.ui.geometry.CornerRadius(18f, 18f),
                          style = androidx.compose.ui.graphics.drawscope.Stroke(width = 4f),
                      )
                      drawLine(
                          color = Color(0x99FFF6D2),
                          start = Offset(bodyLeft + 8f, bodyTop + bodyHeight * 0.22f),
                          end = Offset(bodyLeft + bodyWidth - 8f, bodyTop + bodyHeight * 0.22f),
                          strokeWidth = 2.4f,
                      )
                      drawLine(
                          color = Color(0x88FFF0C2),
                          start = Offset(w * 0.50f, bodyTop + 4f),
                          end = Offset(w * 0.50f, bodyTop + bodyHeight - 4f),
                          strokeWidth = 1.8f,
                      )

                      val lid = androidx.compose.ui.graphics.Path().apply {
                          moveTo(w * 0.20f, h * 0.40f)
                          lineTo(w * 0.31f, h * 0.22f)
                          lineTo(w * 0.72f, h * 0.22f)
                          lineTo(w * 0.82f, h * 0.40f)
                          close()
                      }
                      drawPath(lid, color = Color(0x557F65B6))
                      drawPath(
                          lid,
                          color = Color(0xFFE9C98C),
                          style = androidx.compose.ui.graphics.drawscope.Stroke(width = 4f),
                      )
                      drawLine(
                          color = Color(0xAAFFF5D4),
                          start = Offset(w * 0.31f, h * 0.22f),
                          end = Offset(w * 0.50f, h * 0.40f),
                          strokeWidth = 2f,
                      )
                      drawLine(
                          color = Color(0xAAFFF5D4),
                          start = Offset(w * 0.72f, h * 0.22f),
                          end = Offset(w * 0.50f, h * 0.40f),
                          strokeWidth = 2f,
                      )

                      val flowerCenters = listOf(
                          Offset(w * 0.50f, h * 0.23f),
                          Offset(w * 0.34f, h * 0.56f),
                          Offset(w * 0.50f, h * 0.62f),
                          Offset(w * 0.66f, h * 0.54f),
                          Offset(w * 0.42f, h * 0.72f),
                          Offset(w * 0.61f, h * 0.72f),
                      )
                      flowerCenters.forEachIndexed { index, center ->
                          val petals = if (index == 0) 8 else 6
                          val orbit = if (index == 0) 20f else 13f
                          val petalRadius = (if (index == 0) 13f else 9f) * pulse
                          repeat(petals) { petal ->
                              val angle = (Math.PI * 2.0 * petal / petals) - Math.PI / 2.0
                              drawCircle(
                                  color = if (index % 2 == 0) Color(0xAAE6C8FF) else Color(0xAAFFCEE8),
                                  radius = petalRadius,
                                  center = Offset(
                                      center.x + kotlin.math.cos(angle).toFloat() * orbit,
                                      center.y + kotlin.math.sin(angle).toFloat() * orbit,
                                  ),
                              )
                          }
                          drawCircle(
                              color = Color(0xFFFFE7A4),
                              radius = if (index == 0) 8f else 5.5f,
                              center = center,
                          )
                      }

                      listOf(w * 0.15f, w * 0.85f).forEachIndexed { index, x ->
                          drawLine(
                              color = Color(0xCCDFC184),
                              start = Offset(x, h * 0.34f),
                              end = Offset(x + if (index == 0) -8f else 8f, h * 0.72f),
                              strokeWidth = 2f,
                          )
                          drawCircle(
                              color = Color(0xAAE7D5FF),
                              radius = 8f * pulse,
                              center = Offset(x + if (index == 0) -8f else 8f, h * 0.75f),
                          )
                      }
                  }
                  Surface(
                      shape = CircleShape,
                      color = Color(0xBB6F437F),
                      border = BorderStroke(2.dp, Color(0xFFE6C17E)),
                      modifier = Modifier.align(Alignment.TopCenter).padding(top = 16.dp).size(56.dp),
                  ) {
                      Box(contentAlignment = Alignment.Center) {
                          Text("✦", color = Color(0xFFFFE5A6), style = MaterialTheme.typography.headlineSmall)
                      }
                  }
              }
          }

          @Composable
          private fun StarryRarityPill'''

          page, count = re.subn(
              r'@Composable\nprivate fun StarryLetterBackdrop[\s\S]*?@Composable\nprivate fun StarryRarityPill',
              lambda _: art_block,
              page,
              count=1,
          )
          if count != 1:
              raise SystemExit('failed to replace gacha artwork')

          page = page.replace('今日零紫安全抽', '今日安全抽')
          page_path.write_text(page, encoding='utf-8')

          test_path = Path('app/src/test/java/me/rerere/rikkahub/data/study/StudyRulesTest.kt')
          tests = test_path.read_text(encoding='utf-8')
          if 'gold draw blocks the daily safety purple' not in tests:
              marker = '    private fun millisAt(year: Int, month: Int, day: Int, hour: Int, minute: Int): Long ='
              addition = '''    @Test
              fun `gold draw blocks the daily safety purple`() {
                  val date = "2026-07-24"
                  val state = StudyState(
                      today = date,
                      wallet = StudyWallet(singleDrawTickets = 1),
                      dailyPurpleDrawDate = date,
                      dailyDrawCount = 29,
                      dailyPurpleDrawCount = 0,
                      dailyStudyRecords = mapOf(date to StudyDailyRecord(studyMinutes = 120)),
                  )

                  val result = StudyRules.draw(
                      state = state,
                      count = 1,
                      random = FixedDrawRandom(doubles = mutableListOf(0.99, 0.0)),
                  )

                  assertEquals(StudyRarity.Epic, result.results.single().rarity)
                  assertEquals(0, result.state.wallet.purpleDrawTickets)
                  assertEquals(1, result.state.dailyPurpleDrawCount)
              }

              @Test
              fun `moonlight pool uses the reduced rarity thresholds`() {
                  val purple = StudyRules.draw(
                      StudyState(wallet = StudyWallet(singleDrawTickets = 1)),
                      count = 1,
                      random = FixedDrawRandom(doubles = mutableListOf(0.95, 0.0)),
                  )
                  val gold = StudyRules.draw(
                      StudyState(wallet = StudyWallet(singleDrawTickets = 1)),
                      count = 1,
                      random = FixedDrawRandom(doubles = mutableListOf(0.99, 0.0)),
                  )
                  val rainbow = StudyRules.draw(
                      StudyState(wallet = StudyWallet(singleDrawTickets = 1)),
                      count = 1,
                      random = FixedDrawRandom(doubles = mutableListOf(0.999)),
                  )

                  assertEquals(StudyRarity.Rare, purple.results.single().rarity)
                  assertEquals(StudyRarity.Epic, gold.results.single().rarity)
                  assertEquals(StudyRarity.Rainbow, rainbow.results.single().rarity)
              }

          '''
              if marker not in tests:
                  raise SystemExit('missing test insertion marker')
              tests = tests.replace(marker, addition + marker, 1)
          test_path.write_text(tests, encoding='utf-8')
          PY

      - name: Run focused study tests
        run: |
          chmod +x ./gradlew
          ./gradlew :app:testReleaseUnitTest --tests 'me.rerere.rikkahub.data.study.StudyRulesTest' --no-daemon

      - name: Compile release Kotlin
        run: ./gradlew :app:compileReleaseKotlin --no-daemon

      - name: Commit moonlight gacha
        run: |
