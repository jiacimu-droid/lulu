name: Compact study header once

on:
  push:
    paths:
      - '.github/workflows/compact-study-header-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compact study page header
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/me/rerere/rikkahub/ui/pages/study/StudyPage.kt')
          text = path.read_text(encoding='utf-8')

          old = '''            LazyColumn(
                modifier = Modifier.fillMaxSize().statusBarsPadding(),
                contentPadding = padding + PaddingValues(horizontal = 16.dp, vertical = 14.dp),
                verticalArrangement = Arrangement.spacedBy(14.dp),
            ) {
                item {
                    Row(
                        modifier = Modifier.fillMaxWidth(),
                        verticalAlignment = Alignment.CenterVertically,
                    ) {
                        Surface(
                            modifier = Modifier.size(48.dp).clickable { navController.popBackStack() },
                            shape = CircleShape,
                            color = if (isGachaSection) Color.White.copy(alpha = 0.10f) else Color.White.copy(alpha = 0.72f),
                            border = BorderStroke(
                                1.dp,
                                if (isGachaSection) Color.White.copy(alpha = 0.14f) else StudyColors.blue.copy(alpha = 0.12f),
                            ),
                        ) {
                            Box(contentAlignment = Alignment.Center) {
                                Icon(
                                    HugeIcons.ArrowLeft01,
                                    contentDescription = "返回",
                                    tint = if (isGachaSection) Color.White else MaterialTheme.colorScheme.onSurface,
                                )
                            }
                        }
                    }
                }
                item {
                    SectionChips(
                        selected = section,
                        onSelected = { section = it },
                        dark = isGachaSection,
                    )
                }
'''

          new = '''            LazyColumn(
                modifier = Modifier.fillMaxSize().statusBarsPadding(),
                contentPadding = padding + PaddingValues(horizontal = 16.dp, top = 6.dp, bottom = 14.dp),
                verticalArrangement = Arrangement.spacedBy(12.dp),
            ) {
                item {
                    Row(
                        modifier = Modifier.fillMaxWidth(),
                        verticalAlignment = Alignment.CenterVertically,
                        horizontalArrangement = Arrangement.spacedBy(10.dp),
                    ) {
                        Surface(
                            modifier = Modifier.size(42.dp).clickable { navController.popBackStack() },
                            shape = CircleShape,
                            color = if (isGachaSection) Color.White.copy(alpha = 0.10f) else Color.White.copy(alpha = 0.72f),
                            border = BorderStroke(
                                1.dp,
                                if (isGachaSection) Color.White.copy(alpha = 0.14f) else StudyColors.blue.copy(alpha = 0.12f),
                            ),
                        ) {
                            Box(contentAlignment = Alignment.Center) {
                                Icon(
                                    HugeIcons.ArrowLeft01,
                                    contentDescription = "返回",
                                    tint = if (isGachaSection) Color.White else MaterialTheme.colorScheme.onSurface,
                                    modifier = Modifier.size(22.dp),
                                )
                            }
                        }
                        Box(modifier = Modifier.weight(1f)) {
                            SectionChips(
                                selected = section,
                                onSelected = { section = it },
                                dark = isGachaSection,
                            )
                        }
                    }
                }
'''

          if old not in text:
              raise SystemExit('target study header block not found')

          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Commit changes
        run: |
          rm -f .github/workflows/compact-study-header-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: compact study page header"
          git push origin HEAD:master
