name: Companion core refactor

on:
  pull_request:
    branches: [master]
    paths:
      - '.github/companion-core-refactor-trigger.txt'
      - 'scripts/refactor_companion_core.py'
      - '.github/workflows/companion-core-refactor.yml'

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: companion-core-refactor
  cancel-in-progress: false

jobs:
  refactor:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out refactor source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Preserve refactor script and switch to latest master
        shell: bash
        run: |
          cp scripts/refactor_companion_core.py /tmp/refactor_companion_core.py
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/refactor_companion_core.py')
          text = path.read_text(encoding='utf-8')
          old_guard = '''    if "sessions." in text or "sessions[" in text or "_sessionsVersion" in text:
                  raise RuntimeError("ChatService still directly owns session collection state")
          '''
          new_guard = '''    if "private val sessions = ConcurrentHashMap" in text or "private val _sessionsVersion" in text:
                  raise RuntimeError("ChatService still directly owns session collection state")
          '''
          if old_guard not in text:
              raise SystemExit('session ownership guard patch did not match')
          text = text.replace(old_guard, new_guard, 1)
          old_join = ').joinToString("\\n")'
          new_join = ').joinToString("\\\\n")'
          if old_join not in text:
              raise SystemExit('neutral persistence test newline patch did not match')
          text = text.replace(old_join, new_join, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git fetch origin master
          git checkout -B master origin/master

      - name: Apply guarded refactor
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          python /tmp/refactor_companion_core.py > /tmp/refactor.log 2>&1
          status=$?
          cat /tmp/refactor.log
          if [ "$status" -ne 0 ]; then
            {
              echo '❌ Guarded companion refactor failed before compilation.'
              echo
              echo '```text'
              tail -n 80 /tmp/refactor.log
              echo '```'
            } > /tmp/refactor-comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/refactor-comment.md
            exit "$status"
          fi

      - name: Repair remaining validation call sites
        shell: python
        run: |
          from pathlib import Path

          chat_path = Path('app/src/main/java/me/rerere/rikkahub/service/ChatService.kt')
          chat = chat_path.read_text(encoding='utf-8')
          replacements = [
              (
                  '''            sessions[conversationId]?.let { session ->
                          updateConversation(
                              conversationId,
                              session.state.value.copy(chatSuggestions = emptyList())
                          )
                      }
          ''',
                  '''            getConversationFlow(conversationId).value.let { currentConversation ->
                          updateConversation(
                              conversationId,
                              currentConversation.copy(chatSuggestions = emptyList())
                          )
                      }
          ''',
                  'suggestion reset session access',
              ),
              (
                  '''                ?: sessions[conversationId]?.state?.value
          ''',
                  '''                ?: getConversationFlow(conversationId).value
          ''',
                  'suggestion fallback session access',
              ),
              (
                  '''        val job = sessions[conversationId]?.getJob() ?: return
          ''',
                  '''        val job = sessionRegistry.currentGenerationJob(conversationId) ?: return
          ''',
                  'stop generation session access',
              ),
          ]
          for old, new, label in replacements:
              if chat.count(old) != 1:
                  raise RuntimeError(f'{label}: expected one match, found {chat.count(old)}')
              chat = chat.replace(old, new, 1)
          if 'sessions[conversationId]' in chat:
              raise RuntimeError('ChatService still directly reads sessions by conversation id')
          chat_path.write_text(chat, encoding='utf-8', newline='\n')

          registry_path = Path('app/src/main/java/me/rerere/rikkahub/service/ConversationSessionRegistry.kt')
          registry = registry_path.read_text(encoding='utf-8')
          anchor = '''    fun generationJobFlow(conversationId: Uuid): Flow<Job?> =
                  sessions[conversationId]?.generationJob ?: flowOf(null)
          '''
          replacement = '''    fun generationJobFlow(conversationId: Uuid): Flow<Job?> =
                  sessions[conversationId]?.generationJob ?: flowOf(null)

              fun currentGenerationJob(conversationId: Uuid): Job? =
                  sessions[conversationId]?.getJob()
          '''
          if registry.count(anchor) != 1:
              raise RuntimeError(f'current job registry anchor: expected one match, found {registry.count(anchor)}')
          registry_path.write_text(registry.replace(anchor, replacement, 1), encoding='utf-8', newline='\n')

          stats_path = Path('app/src/main/java/me/rerere/rikkahub/ui/pages/stats/StatsPage.kt')
          stats = stats_path.read_text(encoding='utf-8')
          stats_replacements = [
              (
                  'stats.cacheRecords.take(MaxVisibleCacheRecords)',
                  'stats.cacheRecords.visibleCacheRecords()',
                  'visible cache record selection',
              ),
              (
                  'key = ApiUsageRecord::id,',
                  'key = { it.stableCacheRecordKey() },',
                  'stable cache record key',
              ),
          ]
          for old, new, label in stats_replacements:
              if stats.count(old) != 1:
                  raise RuntimeError(f'{label}: expected one match, found {stats.count(old)}')
              stats = stats.replace(old, new, 1)
          helper_anchor = 'private const val MaxVisibleCacheRecords = 15\n'
          helpers = '''internal fun List<ApiUsageRecord>.visibleCacheRecords(): List<ApiUsageRecord> =
              take(MaxVisibleCacheRecords)

          internal fun ApiUsageRecord.stableCacheRecordKey(): String = id

          private const val MaxVisibleCacheRecords = 15
          '''
          if stats.count(helper_anchor) != 1:
              raise RuntimeError(f'stats helper anchor: expected one match, found {stats.count(helper_anchor)}')
          stats_path.write_text(stats.replace(helper_anchor, helpers, 1), encoding='utf-8', newline='\n')

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web UI dependencies
        shell: bash
        run: |
          npm install --global pnpm@10
          pnpm --dir web-ui install --frozen-lockfile

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile release Kotlin first
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          ./gradlew :app:compileReleaseKotlin --no-daemon --stacktrace > /tmp/compile.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo '❌ Companion refactor failed Release Kotlin compilation; no changes were pushed to master.'
              echo
              echo '```text'
              grep -E '(^e: |^w: |Compilation error|Execution failed for task|What went wrong|BUILD FAILED|Unresolved reference|Argument type mismatch|Cannot infer|Type mismatch)' /tmp/compile.log | tail -n 120
              echo
              echo '--- tail ---'
              tail -n 50 /tmp/compile.log
              echo '```'
            } > /tmp/compile-comment.md
            cat /tmp/compile-comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/compile-comment.md
            exit "$status"
          fi
          tail -n 40 /tmp/compile.log

      - name: Run focused unit tests
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace > /tmp/tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo '❌ Companion refactor passed Release compilation but failed unit tests; no changes were pushed to master.'
              echo
              echo '```text'
              grep -E '(^e: |^w: |Compilation error|Cannot infer|Unresolved reference|Type mismatch|Argument type mismatch|^[A-Za-z0-9_.]+ > .*FAILED$|AssertionError|expected:<|but was:<|There were failing tests|Execution failed for task|BUILD FAILED)' /tmp/tests.log | tail -n 160
              echo
              echo '--- tail ---'
              tail -n 50 /tmp/tests.log
              echo '```'
            } > /tmp/test-comment.md
            cat /tmp/test-comment.md
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/test-comment.md
            exit "$status"
          fi
          tail -n 40 /tmp/tests.log

      - name: Upload concise failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: companion-core-diagnostic
          path: |
            /tmp/refactor-comment.md
            /tmp/compile-comment.md
            /tmp/test-comment.md
            /tmp/compile.log
            /tmp/tests.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Commit verified changes directly to master
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            app/src/main/java/me/rerere/rikkahub/service/ChatService.kt \
            app/src/main/java/me/rerere/rikkahub/service/ConversationSessionRegistry.kt \
            app/src/main/java/me/rerere/rikkahub/data/service/ProactiveMessageService.kt \
            app/src/main/java/me/rerere/rikkahub/data/service/ProactiveMessageScheduler.kt \
            app/src/main/java/me/rerere/rikkahub/data/companion/CompanionRuntime.kt \
            app/src/main/java/me/rerere/rikkahub/ui/pages/stats/StatsPage.kt \
            app/src/test/java/me/rerere/rikkahub/data/companion/CompanionNeutralPersistenceTest.kt
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'refactor: split companion services and neutralize persisted state'
          git push origin master
