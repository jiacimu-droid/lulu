name: Refresh code index

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/architecture/CODE_INDEX.md"
      - "docs/architecture/code-index.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: code-index-master
  cancel-in-progress: true

jobs:
  refresh:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip index]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan suggestion-chain remnants
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          roots = [Path("app"), Path("web"), Path("web-ui"), Path("plugins"), Path(".github")]
          excluded = {
              Path("docs/architecture/suggestion-remnants.txt"),
              Path("docs/architecture/code-index.json"),
              Path("docs/architecture/CODE_INDEX.md"),
          }
          pattern = re.compile(
              r"generateSuggestion|chatSuggestions|onClickSuggestion|ChatSuggestionsRow|"
              r"suggestionModelId|suggestionPrompt|DEFAULT_SUGGESTION_PROMPT|"
              r"SUGGESTION_MODEL|SUGGESTION_PROMPT|EMPTY_SUGGESTIONS|"
              r"displaySuggestions|showSuggestions|handleClickSuggestion|"
              r"onSuggestionClick|SuggestionChip|suggestion-row|suggestion-chip|"
              r"建议回复|自动生成对话建议",
              re.IGNORECASE,
          )
          matches = []
          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob("*"):
                  if not path.is_file() or path in excluded or ".git" in path.parts:
                      continue
                  try:
                      lines = path.read_text(encoding="utf-8").splitlines()
                  except (UnicodeDecodeError, OSError):
                      continue
                  for line_number, line in enumerate(lines, start=1):
                      if pattern.search(line):
                          matches.append(f"{path}:{line_number}:{line.strip()}")

          report = [
              "# Suggestion chain remnants",
              "",
              "Generated from commit: " + __import__("os").environ.get("GITHUB_SHA", "unknown"),
              "",
              *matches,
          ]
          output = Path("docs/architecture/suggestion-remnants.txt")
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text("\n".join(report) + "\n", encoding="utf-8")
          print(f"Found {len(matches)} matching lines")
          PY

      - name: Generate repository index
        env:
          INDEX_COMMIT: ${{ github.sha }}
          INDEX_BRANCH: ${{ github.ref_name }}
        run: |
          python3 scripts/generate_code_index.py
          python3 scripts/enrich_code_index.py

      - name: Validate generated index
        run: |
          test -s docs/architecture/CODE_INDEX.md
          test -s docs/architecture/code-index.json
          test -s docs/architecture/suggestion-remnants.txt
          python3 -m json.tool docs/architecture/code-index.json >/dev/null
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("docs/architecture/code-index.json").read_text(encoding="utf-8"))
          required = {
              "schemaVersion",
              "generatedAt",
              "commit",
              "branch",
              "sourceFingerprint",
              "summary",
              "featureFlows",
              "hotspots",
              "symbolIndex",
              "files",
          }
          missing = sorted(required - data.keys())
          if missing:
              raise SystemExit(f"Code index is missing required keys: {', '.join(missing)}")
          if data["schemaVersion"] < 3:
              raise SystemExit("Code index schemaVersion must be at least 3")
          if not data["files"]:
              raise SystemExit("Code index unexpectedly contains no files")
          if len(data["sourceFingerprint"]) != 64:
              raise SystemExit("Code index sourceFingerprint is invalid")
          if not data["featureFlows"].get("陪伴聊天主链路", {}).get("paths"):
              raise SystemExit("Core companion flow has no indexed entry points")
          if not data["hotspots"].get("largestFiles"):
              raise SystemExit("Code index contains no hotspot data")
          if not data["hotspots"].get("highestApproximateFanIn"):
              raise SystemExit("Code index contains no reverse dependency hotspots")
          if data["summary"].get("resolvedImportEdges", 0) <= 0:
              raise SystemExit("Code index did not resolve any local import edges")
          if not data["symbolIndex"]:
              raise SystemExit("Code index contains no symbol index")
          PY

      - name: Commit refreshed index and audit
        run: |
          if [ -z "$(git status --porcelain -- docs/architecture/CODE_INDEX.md docs/architecture/code-index.json docs/architecture/suggestion-remnants.txt)" ]; then
            echo "Code index and audit are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --force docs/architecture/CODE_INDEX.md docs/architecture/code-index.json docs/architecture/suggestion-remnants.txt
          git commit -m "docs: refresh code index and suggestion audit [skip ci] [skip index]"
          git pull --rebase origin master
          git push origin HEAD:master
