name: Scan suggestion chain remnants

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/scan-suggestion-remnants.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Scan production and test sources
        run: |
          mkdir -p docs/architecture
          {
            echo "# Suggestion chain remnants"
            echo
            echo "Generated from commit: $GITHUB_SHA"
            echo
            rg -n --hidden \
              --glob '!docs/architecture/suggestion-remnants.txt' \
              --glob '!docs/architecture/code-index.json' \
              --glob '!docs/architecture/CODE_INDEX.md' \
              --glob '!.git/**' \
              'generateSuggestion|chatSuggestions|onClickSuggestion|ChatSuggestionsRow|suggestionModelId|suggestionPrompt|DEFAULT_SUGGESTION_PROMPT|SUGGESTION_MODEL|SUGGESTION_PROMPT|建议回复|自动生成对话建议' \
              app web web-ui plugins .github || true
          } > docs/architecture/suggestion-remnants.txt

      - name: Commit scan report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/architecture/suggestion-remnants.txt
          git commit -m "docs: record suggestion-chain remnants [skip ci] [skip index]"
          git pull --rebase origin master
          git push origin HEAD:master
