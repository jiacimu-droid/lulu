name: Add performance monitor once

on:
  push:
    paths:
      - '.github/workflows/add-performance-monitor-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply refactor
        run: python3 scripts/apply_performance_monitor_once.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add desktop performance monitor"
          git push origin HEAD:master
