name: Inspect memory pipeline

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/inspect-memory-pipeline.yml'

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Build focused report
        shell: bash
        run: |
          {
            echo '=== FILES ==='
            find app/src/main -type f \( -name '*.kt' -o -name '*.xml' \) | sort | grep -Ei 'memory|chat|companion|prompt|stats' || true
            echo
            echo '=== MEMORY EXTRACTION REFERENCES ==='
            grep -RInE 'Memory Extraction|memory extraction|extractMemory|extractMemories|memoryThreshold|memory.*threshold|skipRecent|recent.*skip|summari[sz].*memory|memory.*summari[sz]' app/src/main app/src/test 2>/dev/null || true
            echo
            echo '=== TIMING / AWAIT REFERENCES ==='
            grep -RInE 'record.*Memory|Memory.*record|measure.*Memory|await.*memory|join\(\)|generate.*memory|launch.*memory|withContext.*memory' app/src/main 2>/dev/null || true
            echo
            echo '=== PROMPT VIEWPOINT REFERENCES ==='
            grep -RInE '第一人称|角色视角|主视角|叙述者|行动者|主体|谁做|user.*role|assistant.*role' app/src/main 2>/dev/null || true
          } > .github/memory-pipeline-report.txt
      - name: Commit report
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/memory-pipeline-report.txt
          git commit -m 'docs: capture memory pipeline locations'
          git push origin HEAD:master
